name: Smart Contract Tests

on:
  push:
    paths:
      - "smartcontract/**"
      - ".github/workflows/smartcontract.yml"
  pull_request:
    paths:
      - "smartcontract/**"
      - ".github/workflows/smartcontract.yml"
  workflow_dispatch:

jobs:
  test-solidity:
    name: Run Solidity tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smartcontract

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: smartcontract/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Solidity tests
        run: pnpm hardhat test solidity

  test-nodejs:
    name: Run Node.js tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smartcontract

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: smartcontract/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Node.js tests
        run: pnpm hardhat test nodejs
