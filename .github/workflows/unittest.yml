name: Unit Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test-unittest:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install pnpm
      run: npm install -g pnpm

    - name: Install dependencies
      run: pnpm install --ignore-scripts

    #create temporay .env.local file
    - name: Create .env.local for CI
      run: |
        cat > .env.local <<'EOF'
        CONVEX_DEPLOYMENT=dev:handsome-cheetah-220 # team: pan-xiao, project: SimpleTexasHoldem
        VITE_CONVEX_URL=https://handsome-cheetah-220.convex.cloud
        VITE_CONVEX_SITE_URL=https://handsome-cheetah-220.convex.site
        VITE_INFURA_API_URL=https://sepolia.infura.io/v3/fake-api-key-for-ci
        VITE_CONTRACT_ADDRESS=0x9DF11C09eF92e6B9F30942f080490D1e413B72c4
        VITE_CONTRACT_OWNER_ADDRESS=0xDAc57DA61035BF3811ff1FC239eCdA0Ff9931E70
        EOF
        
    - name: Install Playwright Browsers
      run: pnpm exec playwright install --with-deps
    - name: Run Playwright tests
      run: pnpm exec playwright test tests/unittest/
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 30
